name: python

on:
  push:
    paths: ["python/**", ".github/workflows/python.yml"]
  pull_request:
    paths: ["python/**", ".github/workflows/python.yml"]
  workflow_dispatch:

defaults:
  run:
    working-directory: python

jobs:
  test:
    name: unit (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - name: type check
        if: matrix.python-version == '3.12'
        run: mypy src

  integration:
    name: integration (live API)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    env:
      RUN_INTEGRATION: "1"
      TICKATLAS_API_KEY: ${{ secrets.TICKATLAS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q -m integration
