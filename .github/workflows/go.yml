name: go

on:
  push:
    paths: ["go/**", ".github/workflows/go.yml"]
  pull_request:
    paths: ["go/**", ".github/workflows/go.yml"]
  workflow_dispatch:

defaults:
  run:
    working-directory: go

jobs:
  test:
    name: unit (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.21", "1.22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go test -race ./...

  integration:
    name: integration (live API)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    env:
      RUN_INTEGRATION: "1"
      TICKATLAS_API_KEY: ${{ secrets.TICKATLAS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test -tags integration -run Integration ./...
