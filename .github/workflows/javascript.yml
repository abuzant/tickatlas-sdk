name: javascript

on:
  push:
    paths: ["javascript/**", ".github/workflows/javascript.yml"]
  pull_request:
    paths: ["javascript/**", ".github/workflows/javascript.yml"]
  workflow_dispatch:

defaults:
  run:
    working-directory: javascript

jobs:
  test:
    name: unit (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run build
      - run: npm test

  integration:
    name: integration (live API)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    env:
      RUN_INTEGRATION: "1"
      TICKATLAS_API_KEY: ${{ secrets.TICKATLAS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: npm test
